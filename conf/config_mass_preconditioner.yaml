defaults:
  - _self_
  - override hydra/launcher: submitit_slurm

n: 16
p: 3
kappa: 1.2
eps: 0.3333333333333333
maxiter: 1000
poly_step_options: [1, 2, 4]
tensor_ranks: [1, 2, 4]
rhs_kind: besov
rhs_s: 1.0
rhs_upper_limit: 24
rhs_num_modes: 64
rhs_scale: 1.0
rhs_smoothness_margin: 0.25
rhs_normalization_samples: 256
sweep_axis: baseline

hydra:
  run:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${sweep_axis}/${hydra.job.override_dirname}
  launcher:
    timeout_min: 180
    mem_gb: 80
    gpus_per_node: 1
    partition: gpu-h100
    account: extremedata
    setup:
      - "source /scratch/tblickhan/mrx/.venv/bin/activate"
      - "export JAX_ENABLE_X64=1"