# Default configuration for relaxation
defaults:
  - _self_
  - resolution: low  # Options: low, medium, high
  - optional experiment: null  # Load with +experiment=name

# Run parameters
run_name: null  # Auto-generated if null

# Input data
nfs_file: data/gvec_w7x.h5
nfp: 5  # Number of field periods

# Map interpolation parameters
map:
  ns_r: 7
  ns_theta: 9
  ns_zeta: 7
  ps_r: 6
  ps_theta: 6
  ps_zeta: 6
  quad_order: 6
  flip_zeta: false  # Whether to flip the zeta coordinate in the map interpolation

# FEM discretization parameters
fem:
  ns_r: 7
  ns_theta: 9
  ns_zeta: 7
  ps_r: 6
  ps_theta: 6
  ps_zeta: 6
  quad_order: 6

# B-field interpolation
interpolation:
  val_stride: 2  # Validation sampling stride
  exclude_axis_tol: 1e-3

# Relaxation parameters
relaxation:
  num_iters_inner: 100
  num_iters_outer: 1000
  dt0: 1.0
  force_tolerance: 1e-9
  descent_method: gradient  # gradient, conjugate_gradient, newton, bfgs

# Resistivity schedule parameters
eta:
  max: 0.0
  schedule_type: tanh  # tanh, constant, linear

# Noise schedule parameters
noise:
  max: 0.0
  schedule_type: tanh  # tanh, constant, linear
  key: 42

# Output
output:
  dir: out/relax_from_nfs
  save_every: 10  # Save intermediate states every N outer iterations (0 to disable)
  save_final: true
  verbose: true
  print_every: 10
  

# Hydra configuration
hydra:
  job:
    chdir: true  # Change to output directory when running
  run:
    dir: ${hydra:runtime.cwd}/${output.dir}/${now:%Y%m%d_%H%M%S}
  sweep:
    dir: ${hydra:runtime.cwd}/${output.dir}/multirun/${now:%Y%m%d_%H%M%S}
    subdir: ${hydra.job.num}