# Default configuration for relaxation
defaults:
  - _self_
  - resolution: low  # Options: low, medium, high
  - optional experiment: null  # Load with +experiment=name

# Run parameters
run_name: null  # Auto-generated if null

# Input data
nfs_file: data/desc_heliotron_8_8_8.h5
nfp: 3  # Number of field periods

# Map interpolation parameters
map:
  ns_r: 8
  ns_theta: 12
  ns_zeta: 8
  ps_r: 5
  ps_theta: 5
  ps_zeta: 5
  quad_order: 5
  flip_zeta: false  # Whether to flip the zeta coordinate in the map interpolation

# FEM discretization parameters
fem:
  ns_r: 8
  ns_theta: 12
  ns_zeta: 8
  ps_r: 5
  ps_theta: 5
  ps_zeta: 5
  quad_order: 5

# B-field interpolation
interpolation:
  val_stride: 50  # Validation sampling stride
  exclude_axis_tol: 1e-3

# Relaxation parameters
relaxation:
  num_iters_inner: 10
  num_iters_outer: 100
  dt0: 1.0
  force_tolerance: 1e-6
  conjugate: true

# Resistivity schedule parameters
eta:
  max: 0.0
  schedule_type: tanh  # tanh, constant, linear

# Output
output:
  dir: out/relax_from_nfs
  save_every: 1  # Save intermediate states every N outer iterations (0 to disable)
  save_final: true
  verbose: true
  print_every: 1
  

# Hydra configuration
hydra:
  job:
    chdir: true  # Change to output directory when running
  run:
    dir: ${hydra:runtime.cwd}/${output.dir}/${now:%Y%m%d_%H%M%S}
  sweep:
    dir: ${hydra:runtime.cwd}/${output.dir}/multirun/${now:%Y%m%d_%H%M%S}
    subdir: ${hydra.job.num}